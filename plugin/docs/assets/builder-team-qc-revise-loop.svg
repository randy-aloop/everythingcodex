<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380" role="img">
<style>
:root{--color-background-secondary:#f4f6f9;--color-border-secondary:#d3d8e0;--color-text-primary:#1b1e24;--color-text-secondary:#5b6472;}
@media(prefers-color-scheme:dark){:root{--color-background-secondary:#2a2f3a;--color-border-secondary:#454d5b;--color-text-primary:#e7e9ed;--color-text-secondary:#aab2c0;}}
text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
text.th{fill:var(--color-text-primary);font-size:14px;font-weight:600;}
text.ts{fill:var(--color-text-secondary);font-size:12px;}
.arr{stroke:#9aa3b0;stroke-width:1.5;fill:none;}
.c-teal rect,rect.c-teal{fill:#e4f3f0;stroke:#3f9d8f;}
.c-teal text{fill:#1d5e56;}
.c-purple rect,rect.c-purple{fill:#eee9fb;stroke:#7d63c4;}
.c-purple text{fill:#46307f;}
.c-amber rect,rect.c-amber{fill:#fcefd6;stroke:#cf9530;}
.c-amber text{fill:#80540f;}
.c-coral rect,rect.c-coral{fill:#fce6e2;stroke:#dd6f54;}
.c-coral text{fill:#8f3526;}
.c-gray rect,rect.c-gray{fill:#eef1f5;stroke:#94a0b0;}
.c-gray text{fill:#2a2f3a;}
</style>
<title>Revise loop and attempt counter</title>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="350" y="40" text-anchor="middle" dominant-baseline="central">record_gate_decision.py: each revise sets next = attempts + 1.</text>
<text class="ts" x="350" y="58" text-anchor="middle" dominant-baseline="central">If next &#8805; max_revise (default 3), the gate auto-converts to block.</text>

<text class="ts" x="175" y="99" text-anchor="middle" dominant-baseline="central">revise #1</text>
<text class="ts" x="350" y="99" text-anchor="middle" dominant-baseline="central">revise #2</text>
<text class="ts" x="525" y="99" text-anchor="middle" dominant-baseline="central">revise #3</text>

<g class="c-gray"><rect x="20" y="110" width="135" height="56" rx="8" stroke-width="0.5"/><text class="th" x="87" y="130" text-anchor="middle" dominant-baseline="central">attempts = 0</text><text class="ts" x="87" y="148" text-anchor="middle" dominant-baseline="central">start / reset point</text></g>
<g class="c-teal"><rect x="195" y="110" width="135" height="56" rx="8" stroke-width="0.5"/><text class="th" x="262" y="130" text-anchor="middle" dominant-baseline="central">attempts = 1</text><text class="ts" x="262" y="148" text-anchor="middle" dominant-baseline="central">board non-terminal</text></g>
<g class="c-teal"><rect x="370" y="110" width="135" height="56" rx="8" stroke-width="0.5"/><text class="th" x="437" y="130" text-anchor="middle" dominant-baseline="central">attempts = 2</text><text class="ts" x="437" y="148" text-anchor="middle" dominant-baseline="central">board non-terminal</text></g>
<g class="c-coral"><rect x="545" y="110" width="135" height="56" rx="8" stroke-width="0.5"/><text class="th" x="612" y="130" text-anchor="middle" dominant-baseline="central">&#8594; block</text><text class="ts" x="612" y="148" text-anchor="middle" dominant-baseline="central">exit 10 &#183; terminal</text></g>

<line x1="155" y1="138" x2="195" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="330" y1="138" x2="370" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="505" y1="138" x2="545" y2="138" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="150" y="212" text-anchor="middle" dominant-baseline="central">pass / accept-risk</text>
<line x1="87" y1="166" x2="87" y2="250" class="arr" marker-end="url(#arrow)"/>
<line x1="262" y1="166" x2="262" y2="250" class="arr" marker-end="url(#arrow)"/>
<line x1="437" y1="166" x2="437" y2="250" class="arr" marker-end="url(#arrow)"/>

<rect x="20" y="250" width="485" height="48" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
<text class="ts" x="262" y="268" text-anchor="middle" dominant-baseline="central">pass or accepted_with_risk &#8594; attempts reset to 0</text>
<text class="ts" x="262" y="284" text-anchor="middle" dominant-baseline="central">board terminal &#8594; next phase allowed</text>

<line x1="612" y1="166" x2="612" y2="250" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><rect x="545" y="250" width="135" height="48" rx="8" stroke-width="0.5"/><text class="th" x="612" y="268" text-anchor="middle" dominant-baseline="central">stop</text><text class="ts" x="612" y="284" text-anchor="middle" dominant-baseline="central">rework / escalate</text></g>

<text class="ts" x="350" y="330" text-anchor="middle" dominant-baseline="central">Board status drives start_phase: revise = non-terminal (loops, blocks next phase);</text>
<text class="ts" x="350" y="348" text-anchor="middle" dominant-baseline="central">pass / accept-risk = terminal (proceeds); block = terminal-failed.</text>
</svg>
