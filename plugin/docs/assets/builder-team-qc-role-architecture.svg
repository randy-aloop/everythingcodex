<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1180" width="680" height="1180" role="img">
<style>
:root{--color-background-secondary:#f4f6f9;--color-border-secondary:#d3d8e0;--color-text-primary:#1b1e24;--color-text-secondary:#5b6472;}
@media(prefers-color-scheme:dark){:root{--color-background-secondary:#2a2f3a;--color-border-secondary:#454d5b;--color-text-primary:#e7e9ed;--color-text-secondary:#aab2c0;}}
text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
text.th{fill:var(--color-text-primary);font-size:14px;font-weight:600;}
text.ts{fill:var(--color-text-secondary);font-size:12px;}
.arr{stroke:#9aa3b0;stroke-width:1.5;fill:none;}
.c-teal rect,rect.c-teal{fill:#e4f3f0;stroke:#3f9d8f;}
.c-teal text{fill:#1d5e56;}
.c-purple rect,rect.c-purple{fill:#eee9fb;stroke:#7d63c4;}
.c-purple text{fill:#46307f;}
.c-amber rect,rect.c-amber{fill:#fcefd6;stroke:#cf9530;}
.c-amber text{fill:#80540f;}
.c-coral rect,rect.c-coral{fill:#fce6e2;stroke:#dd6f54;}
.c-coral text{fill:#8f3526;}
.c-gray rect,rect.c-gray{fill:#eef1f5;stroke:#94a0b0;}
.c-gray text{fill:#2a2f3a;}
</style>
<title>Builder Team QC V01 role architecture, redrawn sequential</title>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray"><rect x="200" y="30" width="280" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">phase-controller</text><text class="ts" x="340" y="66" text-anchor="middle" dominant-baseline="central">reads build plan, opens/resumes</text><text class="ts" x="340" y="82" text-anchor="middle" dominant-baseline="central">the phase, owns the final gate</text></g>
<line x1="340" y1="94" x2="340" y2="118" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="200" y="118" width="280" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="136" text-anchor="middle" dominant-baseline="central">builder-agent</text><text class="ts" x="340" y="154" text-anchor="middle" dominant-baseline="central">implements the smallest correct</text><text class="ts" x="340" y="170" text-anchor="middle" dominant-baseline="central">change for this phase</text></g>
<line x1="340" y1="182" x2="340" y2="206" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="200" y="206" width="280" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="224" text-anchor="middle" dominant-baseline="central">ponytail-adapter</text><text class="ts" x="340" y="242" text-anchor="middle" dominant-baseline="central">minimal-code discipline gate,</text><text class="ts" x="340" y="258" text-anchor="middle" dominant-baseline="central">before deeper evidence checks</text></g>
<line x1="340" y1="270" x2="340" y2="296" class="arr" marker-end="url(#arrow)"/>

<polygon points="340,296 440,332 340,368 240,332" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
<text class="th" x="340" y="332" text-anchor="middle" dominant-baseline="central">Ponytail pass?</text>
<text class="ts" x="470" y="322" text-anchor="middle" dominant-baseline="central">no</text>
<line x1="440" y1="332" x2="495" y2="332" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><rect x="500" y="304" width="160" height="56" rx="8" stroke-width="0.5"/><text class="th" x="580" y="324" text-anchor="middle" dominant-baseline="central">revise / block</text><text class="ts" x="580" y="342" text-anchor="middle" dominant-baseline="central">back to builder</text></g>
<path d="M580 304 L580 150 L484 150" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="356" y="384" text-anchor="middle" dominant-baseline="central">yes</text>
<line x1="340" y1="368" x2="340" y2="394" class="arr" marker-end="url(#arrow)"/>

<rect x="80" y="394" width="520" height="66" rx="10" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="340" y="412" text-anchor="middle" dominant-baseline="central">.qc shared state</text>
<text class="ts" x="340" y="430" text-anchor="middle" dominant-baseline="central">every role reads &amp; writes: phase record &#183; changed files &#183; test events</text>
<text class="ts" x="340" y="448" text-anchor="middle" dominant-baseline="central">Ponytail verdicts &#183; deviations &#183; decisions &#183; seam audits &#183; gate summary</text>
<line x1="340" y1="460" x2="340" y2="486" class="arr" marker-end="url(#arrow)"/>

<rect x="120" y="486" width="440" height="322" rx="12" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
<text class="th" x="140" y="512" dominant-baseline="central">evidence roles &#8212; run in sequence</text>

<g class="c-purple"><rect x="140" y="532" width="400" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="549" text-anchor="middle" dominant-baseline="central">test-agent</text><text class="ts" x="340" y="565" text-anchor="middle" dominant-baseline="central">records command, status, exit code</text></g>
<line x1="340" y1="576" x2="340" y2="586" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="140" y="586" width="400" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="603" text-anchor="middle" dominant-baseline="central">reviewer-agent</text><text class="ts" x="340" y="619" text-anchor="middle" dominant-baseline="central">architecture fit &#183; minimal code &#183; upkeep</text></g>
<line x1="340" y1="630" x2="340" y2="640" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="140" y="640" width="400" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="657" text-anchor="middle" dominant-baseline="central">compliance-agent</text><text class="ts" x="340" y="673" text-anchor="middle" dominant-baseline="central">plan adherence &#183; protected zones &#183; records</text></g>
<line x1="340" y1="684" x2="340" y2="694" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="140" y="694" width="400" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="711" text-anchor="middle" dominant-baseline="central">integration-agent</text><text class="ts" x="340" y="727" text-anchor="middle" dominant-baseline="central">previous / current / next phase seams</text></g>
<line x1="340" y1="738" x2="340" y2="748" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="140" y="748" width="400" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="765" text-anchor="middle" dominant-baseline="central">release-agent</text><text class="ts" x="340" y="781" text-anchor="middle" dominant-baseline="central">runtime &#183; Docker &#183; rollback &#183; no-secrets</text></g>

<line x1="340" y1="808" x2="340" y2="834" class="arr" marker-end="url(#arrow)"/>
<rect x="120" y="834" width="440" height="34" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="340" y="851" text-anchor="middle" dominant-baseline="central">controller reads every record before the strict gate</text>
<line x1="340" y1="868" x2="340" y2="894" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber"><rect x="200" y="894" width="280" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="912" text-anchor="middle" dominant-baseline="central">strict gate</text><text class="ts" x="340" y="930" text-anchor="middle" dominant-baseline="central">validate_phase_record.py</text><text class="ts" x="340" y="946" text-anchor="middle" dominant-baseline="central">--strict-gate &#183; evidence + safety</text></g>
<line x1="340" y1="958" x2="340" y2="982" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="200" y="982" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="1003" text-anchor="middle" dominant-baseline="central">gate decision</text><text class="ts" x="340" y="1022" text-anchor="middle" dominant-baseline="central">pass&#183;revise&#183;block&#183;accept-risk</text></g>
<line x1="480" y1="1010" x2="495" y2="1010" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><rect x="500" y="982" width="160" height="56" rx="8" stroke-width="0.5"/><text class="th" x="580" y="1002" text-anchor="middle" dominant-baseline="central">revise / block</text><text class="ts" x="580" y="1020" text-anchor="middle" dominant-baseline="central">&#8594; new attempt</text></g>
<line x1="340" y1="1038" x2="340" y2="1062" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="200" y="1062" width="280" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="1080" text-anchor="middle" dominant-baseline="central">phase-board update</text><text class="ts" x="340" y="1098" text-anchor="middle" dominant-baseline="central">final status, next phase, risks,</text><text class="ts" x="340" y="1114" text-anchor="middle" dominant-baseline="central">summary for later audit</text></g>

<rect x="70" y="1150" width="13" height="13" rx="3" class="c-purple"/><text class="ts" x="90" y="1157" dominant-baseline="central">role agent</text>
<rect x="200" y="1150" width="13" height="13" rx="3" class="c-amber"/><text class="ts" x="220" y="1157" dominant-baseline="central">strict gate</text>
<rect x="330" y="1150" width="13" height="13" rx="3" class="c-coral"/><text class="ts" x="350" y="1157" dominant-baseline="central">revise / block</text>
<rect x="475" y="1150" width="13" height="13" rx="3" class="c-gray"/><text class="ts" x="495" y="1157" dominant-baseline="central">controller / gate</text>
</svg>
